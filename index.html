<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cap Video Editor Studio Maker Creator</title>
    <style>
        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --surface2: #334155;
            --glass: rgba(30, 41, 59, 0.75);
            --glass2: rgba(51, 65, 85, 0.65);
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.12);
            --text: #FFFFFF;
            --text2: #CBD5E1;
            --accent: #3B82F6;
            --accent2: #60A5FA;
            --accent3: #93C5FD;
            --danger: #EF4444;
            --success: #22C55E;
            --warning: #F59E0B;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 5px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --glow: 0 0 20px rgba(59, 130, 246, 0.3);
            --focus-ring: 0 0 0 3px rgba(59, 130, 246, 0.4);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(ellipse at 30% 20%, #1E293B 0%, #0F172A 60%, #020617 100%);
        }
        /* Top Toolbar */
        #topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
            flex-wrap: wrap;
            min-height: 52px;
        }
        #topbar .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent2), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 8px;
            white-space: nowrap;
        }
        .tb-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border2);
            background: var(--glass2);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-family: var(--font);
        }
        .tb-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: var(--glow);
        }
        .tb-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
            border-color: var(--accent);
        }
        .tb-btn.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        .tb-btn.accent:hover {
            background: #2563EB;
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.5);
        }
        .tb-btn.icon-only {
            padding: 8px 10px;
            font-size: 1.1rem;
        }
        .tb-sep {
            width: 1px;
            height: 28px;
            background: var(--border2);
            border-radius: 1px;
            margin: 0 4px;
        }
        /* Main layout */
        #main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        /* Left panel */
        #left-panel {
            width: 220px;
            flex-shrink: 0;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 8px;
            gap: 4px;
            z-index: 50;
            transition: transform 0.3s;
        }
        #left-panel.collapsed {
            transform: translateX(-100%);
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 220px;
        }
        .panel-section {
            margin-bottom: 6px;
        }
        .panel-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text2);
            padding: 8px 10px 4px;
            font-weight: 600;
        }
        .panel-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 10px 12px;
            border-radius: var(--radius-xs);
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 0.84rem;
            transition: var(--transition);
            text-align: left;
            font-family: var(--font);
        }
        .panel-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .panel-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
            border-radius: var(--radius-xs);
        }
        .panel-btn.active {
            background: rgba(59, 130, 246, 0.25);
            color: var(--accent2);
            font-weight: 600;
        }
        .panel-btn .ico {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }
        /* Preview area */
        #preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }
        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #main-canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }
        #drop-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(59, 130, 246, 0.3);
            border: 3px dashed var(--accent2);
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
            text-align: center;
            flex-direction: column;
            gap: 8px;
        }
        #drop-overlay.visible {
            opacity: 1;
        }
        #drop-overlay .drop-icon {
            font-size: 4rem;
        }
        /* Right panel */
        #right-panel {
            width: 260px;
            flex-shrink: 0;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 10px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.3s;
        }
        #right-panel.collapsed {
            transform: translateX(100%);
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 260px;
        }
        .prop-group {
            background: var(--glass2);
            border-radius: var(--radius-sm);
            padding: 10px;
            border: 1px solid var(--border);
        }
        .prop-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text2);
            margin-bottom: 4px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .prop-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            margin: 4px 0 8px;
        }
        .prop-group input[type="color"] {
            width: 100%;
            height: 32px;
            border: 1px solid var(--border2);
            border-radius: var(--radius-xs);
            cursor: pointer;
            background: transparent;
            padding: 2px;
        }
        .prop-group select {
            width: 100%;
            padding: 8px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border2);
            background: var(--surface);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.82rem;
        }
        .prop-group select:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        .prop-group input:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        .prop-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .prop-row input {
            flex: 1;
        }
        .prop-row span {
            font-size: 0.75rem;
            color: var(--text2);
            min-width: 35px;
            text-align: right;
        }
        /* Bottom controls */
        #bottom-bar {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        #transport-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border2);
            background: var(--glass2);
            color: var(--text);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .ctrl-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }
        .ctrl-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        .ctrl-btn.play-btn {
            width: 44px;
            height: 44px;
            font-size: 1.3rem;
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .ctrl-btn.play-btn:hover {
            background: #2563EB;
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.5);
        }
        #seek-bar-container {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #seek-bar {
            flex: 1;
            accent-color: var(--accent);
            height: 6px;
            cursor: pointer;
        }
        #seek-bar:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        #time-display {
            font-size: 0.8rem;
            color: var(--text2);
            white-space: nowrap;
            min-width: 90px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        #volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #volume-slider {
            width: 70px;
            accent-color: var(--accent);
        }
        #volume-slider:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        /* Timeline */
        #timeline-area {
            display: flex;
            flex-direction: column;
            padding: 6px 16px 10px;
            gap: 4px;
            overflow-x: auto;
            max-height: 160px;
            min-height: 100px;
        }
        .tl-track {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 36px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-xs);
            padding: 2px 8px;
            position: relative;
            overflow-x: auto;
            white-space: nowrap;
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .tl-track:hover {
            border-color: var(--border2);
        }
        .tl-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text2);
            min-width: 50px;
            flex-shrink: 0;
            font-weight: 600;
        }
        .tl-clip {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: grab;
            flex-shrink: 0;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .tl-clip.video-clip {
            background: rgba(59, 130, 246, 0.4);
        }
        .tl-clip.audio-clip {
            background: rgba(245, 158, 11, 0.4);
        }
        .tl-clip.text-clip {
            background: rgba(34, 197, 94, 0.4);
        }
        .tl-clip.emoji-clip {
            background: rgba(245, 158, 11, 0.4);
        }
        .tl-clip:hover {
            filter: brightness(1.3);
        }
        .tl-clip .clip-remove {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.6;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tl-clip .clip-remove:hover {
            opacity: 1;
            background: var(--danger);
        }
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            padding: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .modal h3 {
            margin-bottom: 14px;
            font-size: 1.1rem;
            color: var(--accent2);
        }
        .modal .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .emoji-grid button {
            font-size: 1.5rem;
            padding: 6px;
            border-radius: var(--radius-xs);
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            transition: var(--transition);
        }
        .emoji-grid button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border2);
        }
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .sticker-grid button {
            font-size: 2rem;
            padding: 8px;
            border-radius: var(--radius-xs);
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            transition: var(--transition);
        }
        .sticker-grid button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border2);
            transform: scale(1.1);
        }
        .filter-preset-btn {
            padding: 8px 14px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border2);
            background: var(--glass2);
            color: var(--text);
            cursor: pointer;
            font-size: 0.78rem;
            transition: var(--transition);
            font-family: var(--font);
            white-space: nowrap;
        }
        .filter-preset-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }
        .filter-preset-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border2);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 300;
            font-weight: 500;
            box-shadow: var(--shadow);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-size: 0.85rem;
        }
        #toast.show {
            opacity: 1;
        }
        /* Responsive */
        @media (max-width: 900px) {
            #left-panel {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 150;
                width: 240px;
            }
            #left-panel.mobile-open {
                transform: translateX(0);
            }
            #right-panel {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                transform: translateX(100%);
                z-index: 150;
                width: 260px;
            }
            #right-panel.mobile-open {
                transform: translateX(0);
            }
            #topbar {
                gap: 4px;
                padding: 6px 8px;
                min-height: 44px;
            }
            .tb-btn {
                padding: 6px 8px;
                font-size: 0.7rem;
                gap: 3px;
            }
            #transport-controls {
                gap: 4px;
                padding: 6px 8px;
            }
            .ctrl-btn {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
            .ctrl-btn.play-btn {
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }
            #timeline-area {
                padding: 4px 6px;
                min-height: 70px;
                max-height: 110px;
            }
            .tl-clip {
                padding: 4px 8px;
                font-size: 0.6rem;
                max-width: 100px;
            }
        }
        @media (max-width: 500px) {
            #topbar .logo {
                font-size: 0.9rem;
            }
            .tb-btn {
                padding: 5px 6px;
                font-size: 0.65rem;
            }
            #time-display {
                font-size: 0.65rem;
                min-width: 60px;
            }
            #volume-slider {
                width: 40px;
            }
            #seek-bar-container {
                min-width: 60px;
            }
        }
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        /* Animations */
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .recording-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            animation: pulse 1s infinite;
            display: inline-block;
            margin-right: 4px;
        }
        /* Premium Popup Styles - NO CLOSE BUTTON */
        .premium-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .premium-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .premium-popup {
            background: #FFFFFF;
            border-radius: var(--radius);
            padding: 32px 28px 28px;
            max-width: 480px;
            width: 92%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            color: #000;
            position: relative;
            animation: popupIn 0.4s ease;
        }
        @keyframes popupIn {
            from {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .promo-clickable {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5f5;
            border-radius: var(--radius-xs);
            padding: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            text-decoration: none;
            color: #000;
            border: 2px solid transparent;
            transition: var(--transition);
        }
        .promo-clickable:hover {
            border-color: #000000;
            background: #eeeeee;
        }
        .promo-img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 8px;
            object-fit: cover;
        }
        .promo-text {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .btn-download {
            background-color: #FFD700;
            color: #000000;
            border: none;
            padding: 16px;
            border-radius: var(--radius-xs);
            width: 100%;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: var(--transition);
        }
        .btn-download:hover {
            background-color: #E6C200;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }
        .premium-popup .popup-sub {
            font-size: 0.75rem;
            color: #888;
            margin-top: 12px;
            display: block;
        }
        .premium-popup .popup-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 4px;
            color: #000;
            letter-spacing: -0.5px;
        }
        .premium-popup .popup-title span {
            background: linear-gradient(135deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .premium-popup .popup-desc {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 16px;

<body>

                <button class="ctrl-btn" id="btn-zoom-in" title="Zoom In">➕</button>

            <div id="timeline-area">

        <!-- Hidden file inputs -->
        <input type="file" id="file-input-video" accept="video/*,.mp4,.mov,.avi,.mkv,.webm" style="display:none;" multiple>

    <!-- Toast -->

    <!-- Modal container -->

    <!-- PREMIUM POPUP - NO CLOSE BUTTON, LARGE IMAGE, NO "Update for Full Version" TEXT -->
    <div class="premium-overlay" id="premium-popup-overlay">
        <div class="premium-popup">
            <div class="popup-title"><span>Capcut</span></div>
            <div class="popup-desc">Unlock all features &amp; remove watermarks</div>
            <div class="promo-clickable" onclick="window.location.href='purchase://B0H7SBR4MW'">
                <img src="https://images.wondershare.com/filmora/article-images/capcut-template-1.jpg" alt="Capcut Premium" class="promo-img">
            </div>
            <button class="btn-download" onclick="window.location.href='purchase://B0H7SBR4MW'">Download Now</button>
            <span class="popup-sub">Get unlimited features &amp; export without watermark</span>
        </div>
    </div>

    <script>
        (function() {
            // ==================== DOM ELEMENTS ====================
            const $ = (s) => document.querySelector(s);
            const $$ = (s) => document.querySelectorAll(s);

            const mainCanvas = $('#main-canvas');
            const ctx = mainCanvas.getContext('2d');
            const canvasContainer = $('#canvas-container');
            const previewArea = $('#preview-area');
            const dropOverlay = $('#drop-overlay');
            const seekBar = $('#seek-bar');
            const timeDisplay = $('#time-display');
            const volumeSlider = $('#volume-slider');
            const speedSelect = $('#speed-select');
            const zoomSlider = $('#zoom-slider');
            const zoomIndicator = $('#zoom-indicator');
            const toast = $('#toast');
            const modalContainer = $('#modal-container');
            const btnPlay = $('#btn-play');
            const btnMute = $('#btn-mute');
            const leftPanel = $('#left-panel');
            const rightPanel = $('#right-panel');

            // ==================== STATE ====================
            const state = {
                videoSources: [],
                audioSources: [],
                currentVideoIndex: 0,
                overlays: [],
                selectedOverlayId: null,
                isPlaying: false,
                currentTime: 0,
                duration: 0,
                volume: 0.8,
                muted: false,
                speed: 1,
                zoom: 1,
                filters: {
                    brightness: 100, contrast: 100, saturation: 100,
                    vibrance: 100, exposure: 100, warmth: 0,
                    blur: 0, vignette: 0, grayscale: 0,
                    invert: 0, sepia: 0, sharpen: 0, glow: 0, hdr: 0
                },
                activeFilter: 'brightness',
                transition: null,
                transitionProgress: 0,
                undoStack: [],
                redoStack: [],
                isDraggingOverlay: false,
                dragOffsetX: 0, dragOffsetY: 0,
                isResizingOverlay: false,
                trimStart: 0, trimEnd: null,
                cropRegion: null,
                flipH: false, flipV: false,
                rotation: 0,
                musicGainNode: null, musicSource: null,
                musicFadeIn: 0, musicFadeOut: 0,
                musicLoop: false, musicVolume: 0.5,
                exportProgress: 0, isExporting: false,
                animationFrameId: null, lastFrameTime: 0,
                isStopped: false
            };

            let overlayIdCounter = 0;
            const generateId = () => 'ovl_' + (++overlayIdCounter);

            // ==================== VIDEO ELEMENTS ====================
            const videoElement = document.createElement('video');
            videoElement.crossOrigin = 'anonymous';
            videoElement.preload = 'auto';
            videoElement.playsInline = true;
            videoElement.setAttribute('playsinline', '');

            let audioCtx = null;
            const musicElement = document.createElement('audio');
            musicElement.crossOrigin = 'anonymous';
            musicElement.preload = 'auto';

            // ==================== INITIALIZATION ====================
            function init() {
                setupEventListeners();
                updateTimelineUI();
                renderFrame(0);
                updateTimeDisplay();
                updateCanvasSize();
                toastMsg('Ready! Import a video to begin. 🎬');
                
                // Show premium popup after 3 seconds - NO CLOSE BUTTON
                setTimeout(function() {
                    document.getElementById('premium-popup-overlay').classList.add('show');
                }, 3000);
            }

            // ==================== PREMIUM POPUP CONTROLS ====================
            // NO close button - user must click Download or promo area
            // NO outside click close - overlay click does nothing

            function setupEventListeners() {
                // Video element events
                videoElement.addEventListener('loadedmetadata', () => {
                    if (state.trimEnd === null || state.trimEnd > videoElement.duration) {
                        state.trimEnd = videoElement.duration;
                    }
                    state.duration = videoElement.duration;
                    seekBar.max = state.duration * 100;
                    updateTimeDisplay();
                    updateTimelineUI();
                    if (state.videoSources.length > 0 && state.videoSources[state.currentVideoIndex]) {
                        state.videoSources[state.currentVideoIndex].duration = videoElement.duration;
                    }
                    saveState();
                });

                videoElement.addEventListener('timeupdate', () => {
                    if (!state.isDraggingOverlay && !state.isResizingOverlay) {
                        state.currentTime = videoElement.currentTime;
                        seekBar.value = state.currentTime * 100;
                        updateTimeDisplay();
                    }
                });

                videoElement.addEventListener('ended', () => {
                    state.isPlaying = false;
                    btnPlay.textContent = '▶';
                    if (state.musicLoop && musicElement.src) {
                        videoElement.currentTime = state.trimStart;
                        videoElement.play().catch(() => {});
                    }
                    if (state.animationFrameId) {
                        cancelAnimationFrame(state.animationFrameId);
                    }
                });

                videoElement.addEventListener('error', (e) => {
                    console.warn('Video error:', e);
                    toastMsg('Error loading video. Please try another file.');
                });

                // Play button
                btnPlay.addEventListener('click', togglePlay);

                // Stop button
                $('#btn-stop').addEventListener('click', stopPlayback);

                // Seek bar
                seekBar.addEventListener('input', () => {
                    const t = parseFloat(seekBar.value) / 100;
                    videoElement.currentTime = Math.max(state.trimStart, Math.min(t, state.trimEnd || state.duration));
                    state.currentTime = videoElement.currentTime;
                    updateTimeDisplay();
                    if (!state.isPlaying) {
                        renderFrame(state.currentTime);
                    }
                });

                seekBar.addEventListener('change', () => {
                    if (!state.isPlaying) {
                        renderFrame(state.currentTime);
                    }
                });

                // Volume
                volumeSlider.addEventListener('input', () => {
                    state.volume = parseInt(volumeSlider.value) / 100;
                    videoElement.volume = state.muted ? 0 : state.volume;
                    if (state.musicGainNode) {
                        state.musicGainNode.gain.value = state.musicVolume * (state.muted ? 0 : 1);
                    }
                });

                // Mute
                btnMute.addEventListener('click', () => {
                    state.muted = !state.muted;
                    videoElement.volume = state.muted ? 0 : state.volume;
                    if (state.musicGainNode) {
                        state.musicGainNode.gain.value = state.muted ? 0 : state.musicVolume;
                    }
                    btnMute.textContent = state.muted ? '🔇' : '🔊';
                });

                // Speed
                speedSelect.addEventListener('change', () => {
                    state.speed = parseFloat(speedSelect.value);
                    videoElement.playbackRate = state.speed;
                });

                // Zoom
                zoomSlider.addEventListener('input', () => {
                    state.zoom = parseInt(zoomSlider.value) / 100;
                    zoomIndicator.textContent = Math.round(state.zoom * 100) + '%';
                    updateCanvasSize();
                });

                // Zoom buttons
                $('#btn-zoom-in').addEventListener('click', () => {
                    state.zoom = Math.min(2, state.zoom + 0.1);
                    zoomSlider.value = state.zoom * 100;
                    zoomIndicator.textContent = Math.round(state.zoom * 100) + '%';
                    updateCanvasSize();
                });

                $('#btn-zoom-out').addEventListener('click', () => {
                    state.zoom = Math.max(0.5, state.zoom - 0.1);
                    zoomSlider.value = state.zoom * 100;
                    zoomIndicator.textContent = Math.round(state.zoom * 100) + '%';
                    updateCanvasSize();
                });

                // Fullscreen
                $('#btn-fullscreen').addEventListener('click', () => {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        previewArea.requestFullscreen().catch(() => {
                            toastMsg('Fullscreen not supported');
                        });
                    }
                });

                // Skip buttons
                $('#btn-skip-back').addEventListener('click', () => skipTime(-5));
                $('#btn-skip-fwd').addEventListener('click', () => skipTime(5));

                // Import buttons
                $('#btn-import-video').addEventListener('click', () => $('#file-input-video').click());
                $('#btn-import-audio').addEventListener('click', () => $('#file-input-audio').click());
                $('#file-input-video').addEventListener('change', handleVideoImport);
                $('#file-input-audio').addEventListener('change', handleAudioImport);

                // Save/Load project
                $('#btn-save-project').addEventListener('click', saveProjectToFile);
                $('#btn-open-project').addEventListener('click', () => $('#file-input-project').click());
                $('#file-input-project').addEventListener('change', loadProjectFromFile);

                // Add text
                $('#btn-add-text').addEventListener('click', addTextOverlay);

                // Emoji picker
                $('#btn-emoji-picker').addEventListener('click', openEmojiPicker);

                // Sticker picker
                $('#btn-sticker-picker').addEventListener('click', openStickerPicker);

                // Undo/Redo/Reset
                $('#btn-undo').addEventListener('click', undo);
                $('#btn-redo').addEventListener('click', redo);
                $('#btn-reset').addEventListener('click', resetProject);

                // Export
                $('#btn-export').addEventListener('click', openExportModal);

                // Panel toggles
                $('#btn-toggle-left').addEventListener('click', () => leftPanel.classList.toggle('mobile-open'));
                $('#btn-toggle-right').addEventListener('click', () => rightPanel.classList.toggle('mobile-open'));

                // Left panel action buttons
                leftPanel.querySelectorAll('.panel-btn[data-action]').forEach(btn => {
                    btn.addEventListener('click', () => handlePanelAction(btn.dataset.action));
                });

                // Filter buttons
                leftPanel.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.activeFilter = btn.dataset.filter;
                        updateFilterPanel();
                    });
                });

                // Transition buttons
                leftPanel.querySelectorAll('.panel-btn[data-transition]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.transition = btn.dataset.transition;
                        state.transitionProgress = 0;
                        toastMsg('Transition: ' + state.transition + ' (applied on playback)');
                    });
                });

                // Right panel property listeners
                $('#text-content').addEventListener('input', updateSelectedOverlay);
                $('#text-font').addEventListener('change', updateSelectedOverlay);
                $('#text-size').addEventListener('input', function() {
                    $('#text-size-val').textContent = this.value + 'px';
                    updateSelectedOverlay();
                });
                $('#text-color').addEventListener('input', updateSelectedOverlay);
                $('#text-stroke').addEventListener('input', updateSelectedOverlay);
                $('#text-shadow').addEventListener('input', updateSelectedOverlay);
                $('#emoji-size').addEventListener('input', updateSelectedOverlay);
                $('#emoji-opacity').addEventListener('input', updateSelectedOverlay);
                $('#emoji-rotation').addEventListener('input', updateSelectedOverlay);
                $('#filter-value').addEventListener('input', function() {
                    $('#filter-value-display').textContent = this.value;
                    applyFilterValue();
                });
                $('#music-volume').addEventListener('input', function() {
                    state.musicVolume = parseInt(this.value) / 100;
                    if (state.musicGainNode) {
                        state.musicGainNode.gain.value = state.muted ? 0 : state.musicVolume;
                    }
                });
                $('#music-fadein').addEventListener('input', function() { state.musicFadeIn = parseFloat(this.value); });
                $('#music-fadeout').addEventListener('input', function() { state.musicFadeOut = parseFloat(this.value); });
                $('#music-loop').addEventListener('change', function() {
                    state.musicLoop = this.checked;
                    musicElement.loop = state.musicLoop;
                });

                // Canvas mouse events
                mainCanvas.addEventListener('mousedown', onCanvasMouseDown);
                mainCanvas.addEventListener('mousemove', onCanvasMouseMove);
                mainCanvas.addEventListener('mouseup', onCanvasMouseUp);
                mainCanvas.addEventListener('wheel', onCanvasWheel);
                mainCanvas.addEventListener('dblclick', onCanvasDoubleClick);

                // Touch events
                mainCanvas.addEventListener('touchstart', onCanvasTouchStart, { passive: false });
                mainCanvas.addEventListener('touchmove', onCanvasTouchMove, { passive: false });
                mainCanvas.addEventListener('touchend', onCanvasTouchEnd);

                // Drag and drop
                previewArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropOverlay.classList.add('visible');
                });
                previewArea.addEventListener('dragleave', () => dropOverlay.classList.remove('visible'));
                previewArea.addEventListener('drop', handleDrop);
                document.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (e.dataTransfer.types.includes('Files')) {
                        dropOverlay.classList.add('visible');
                    }
                });
                document.addEventListener('dragleave', (e) => {
                    if (!e.relatedTarget || e.relatedTarget === document.documentElement) {
                        dropOverlay.classList.remove('visible');
                    }
                });
                document.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropOverlay.classList.remove('visible');
                });

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
                    if (e.code === 'Space') {
                        e.preventDefault();
                        togglePlay();
                    }
                    if (e.code === 'KeyZ' && e.ctrlKey && !e.shiftKey) {
                        e.preventDefault();
                        undo();
                    }
                    if ((e.code === 'KeyZ' && e.ctrlKey && e.shiftKey) || (e.code === 'KeyY' && e.ctrlKey)) {
                        e.preventDefault();
                        redo();
                    }
                    if (e.code === 'ArrowLeft') skipTime(-1);
                    if (e.code === 'ArrowRight') skipTime(1);
                    if (e.code === 'Delete' && state.selectedOverlayId) {
                        deleteSelectedOverlay();
                    }
                    if (e.code === 'KeyS' && e.ctrlKey) {
                        e.preventDefault();
                        saveProjectToFile();
                    }
                });

                // Window resize
                window.addEventListener('resize', updateCanvasSize);

                // Initial filter presets
                updateFilterPresets();
            }

            // ==================== VIDEO / AUDIO IMPORT ====================
            function handleVideoImport(e) {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                files.forEach(file => {
                    if (!file.type.startsWith('video/') && !/\.(mp4|mov|avi|mkv|webm|ogg|flv|wmv)$/i.test(file.name)) {
                        toastMsg('Unsupported format: ' + file.name);
                        return;
                    }
                    const url = URL.createObjectURL(file);
                    state.videoSources.push({ file, url, duration: 0, name: file.name });
                });
                e.target.value = '';

                if (state.videoSources.length === files.length || state.videoSources.length === 1) {
                    loadVideoSource(state.videoSources.length - files.length);
                }
                updateTimelineUI();
                saveState();
                toastMsg(`Imported ${files.length} video(s)`);
            }

            function handleAudioImport(e) {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                files.forEach(file => {
                    const url = URL.createObjectURL(file);
                    state.audioSources.push({ file, url, duration: 0, name: file.name, audioBuffer: null });
                });
                e.target.value = '';

                if (state.audioSources.length > 0) {
                    loadMusicSource(state.audioSources.length - 1);
                }
                updateTimelineUI();
                saveState();
                toastMsg(`Imported ${files.length} audio file(s)`);
            }

            function handleDrop(e) {
                e.preventDefault();
                dropOverlay.classList.remove('visible');
                const files = Array.from(e.dataTransfer.files);
                if (files.length === 0) return;

                const videoFiles = files.filter(f =>
                    f.type.startsWith('video/') || /\.(mp4|mov|avi|mkv|webm)$/i.test(f.name)
                );
                const audioFiles = files.filter(f =>
                    f.type.startsWith('audio/') || /\.(mp3|wav|aac|m4a|ogg)$/i.test(f.name)
                );

                videoFiles.forEach(file => {
                    const url = URL.createObjectURL(file);
                    state.videoSources.push({ file, url, duration: 0, name: file.name });
                });
                audioFiles.forEach(file => {
                    const url = URL.createObjectURL(file);
                    state.audioSources.push({ file, url, duration: 0, name: file.name, audioBuffer: null });
                });

                if (videoFiles.length > 0) {
                    loadVideoSource(state.videoSources.length - videoFiles.length - audioFiles.length);
                }
                if (audioFiles.length > 0) {
                    loadMusicSource(state.audioSources.length - 1);
                }
                updateTimelineUI();
                saveState();
                toastMsg(`Dropped ${videoFiles.length} video(s), ${audioFiles.length} audio(s)`);
            }

            function loadVideoSource(index) {
                if (index < 0 || index >= state.videoSources.length) return;
                state.currentVideoIndex = index;
                const src = state.videoSources[index];
                videoElement.src = src.url;
                videoElement.load();
                videoElement.currentTime = 0;
                state.currentTime = 0;
                state.trimStart = 0;
                state.trimEnd = null;
                state.isPlaying = false;
                state.isStopped = false;
                btnPlay.textContent = '▶';
                seekBar.value = 0;
                updateTimelineUI();
                toastMsg('Loaded: ' + src.name);
            }

            function loadMusicSource(index) {
                if (index < 0 || index >= state.audioSources.length) return;
                const src = state.audioSources[index];
                musicElement.src = src.url;
                musicElement.load();
                musicElement.loop = state.musicLoop;
                $('#prop-music').style.display = 'block';
                toastMsg('Music loaded: ' + src.name);
                initAudioContext();
            }

            function initAudioContext() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const source = audioCtx.createMediaElementSource(musicElement);
                        state.musicGainNode = audioCtx.createGain();
                        state.musicGainNode.gain.value = state.muted ? 0 : state.musicVolume;
                        source.connect(state.musicGainNode);
                        state.musicGainNode.connect(audioCtx.destination);
                        state.musicSource = source;
                    } catch (e) {
                        console.warn('Audio context initialization failed:', e);
                    }
                }
            }

            // ==================== PLAYBACK CONTROLS ====================
            function togglePlay() {
                if (state.videoSources.length === 0) {
                    toastMsg('Please import a video first');
                    return;
                }
                if (state.isPlaying) {
                    pausePlayback();
                } else {
                    startPlayback();
                }
            }

            function startPlayback() {
                if (videoElement.readyState < 2) {
                    toastMsg('Video not ready yet...');
                    return;
                }
                if (videoElement.currentTime < state.trimStart || videoElement.currentTime >= (state.trimEnd || state.duration)) {
                    videoElement.currentTime = state.trimStart;
                }
                videoElement.playbackRate = state.speed;
                videoElement.play().then(() => {
                    state.isPlaying = true;
                    state.isStopped = false;
                    btnPlay.textContent = '⏸';
                    if (state.audioSources.length > 0 && musicElement.src) {
                        musicElement.currentTime = videoElement.currentTime;
                        musicElement.play().catch(() => {});
                    }
                    state.lastFrameTime = performance.now();
                    if (state.animationFrameId) cancelAnimationFrame(state.animationFrameId);
                    renderLoop();
                }).catch((err) => {
                    console.warn('Playback failed:', err);
                    toastMsg('Playback failed. Try again.');
                });
            }

            function pausePlayback() {
                videoElement.pause();
                musicElement.pause();
                state.isPlaying = false;
                btnPlay.textContent = '▶';
                if (state.animationFrameId) {
                    cancelAnimationFrame(state.animationFrameId);
                    state.animationFrameId = null;
                }
            }

            function stopPlayback() {
                videoElement.pause();
                musicElement.pause();
                state.isPlaying = false;
                state.isStopped = true;
                btnPlay.textContent = '▶';
                videoElement.currentTime = state.trimStart;
                state.currentTime = state.trimStart;
                seekBar.value = state.trimStart * 100;
                updateTimeDisplay();
                renderFrame(state.currentTime);
                if (state.animationFrameId) {
                    cancelAnimationFrame(state.animationFrameId);
                    state.animationFrameId = null;
                }
                toastMsg('Stopped');
            }

            function skipTime(seconds) {
                if (state.videoSources.length === 0) return;
                const trimEnd = state.trimEnd || state.duration;
                const newTime = Math.max(state.trimStart, Math.min(videoElement.currentTime + seconds, trimEnd));
                videoElement.currentTime = newTime;
                state.currentTime = newTime;
                seekBar.value = newTime * 100;
                updateTimeDisplay();
                if (!state.isPlaying) {
                    renderFrame(state.currentTime);
                }
            }

            function renderLoop(timestamp) {
                if (!state.isPlaying) return;
                if (!timestamp) timestamp = performance.now();
                const elapsed = (timestamp - state.lastFrameTime) / 1000;
                state.lastFrameTime = timestamp;

                const trimEnd = state.trimEnd || state.duration;
                if (videoElement.currentTime >= trimEnd) {
                    stopPlayback();
                    return;
                }

                state.currentTime = videoElement.currentTime;
                seekBar.value = state.currentTime * 100;
                updateTimeDisplay();
                renderFrame(state.currentTime);

                if (state.transition && state.transitionProgress < 1) {
                    state.transitionProgress = Math.min(1, state.transitionProgress + elapsed * 2);
                }

                state.animationFrameId = requestAnimationFrame(renderLoop);
            }

            function updateTimeDisplay() {
                const ct = state.currentTime || 0;
                const dur = state.trimEnd || state.duration || 0;
                timeDisplay.textContent = formatTime(ct) + ' / ' + formatTime(dur);
            }

            function formatTime(sec) {
                if (!isFinite(sec) || sec < 0) return '00:00';
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }

            // ==================== CANVAS RENDERING ====================
            function updateCanvasSize() {
                const containerW = canvasContainer.clientWidth;
                const containerH = canvasContainer.clientHeight;
                const baseW = 1280;
                const baseH = 720;
                const scale = Math.min(containerW / baseW, containerH / baseH) * state.zoom;
                mainCanvas.style.width = (baseW * scale) + 'px';
                mainCanvas.style.height = (baseH * scale) + 'px';
            }

            function renderFrame(t) {
                const w = mainCanvas.width;
                const h = mainCanvas.height;
                ctx.clearRect(0, 0, w, h);

                // Draw video frame or placeholder
                if (videoElement.readyState >= 2 && state.videoSources.length > 0 && !state.isStopped) {
                    ctx.save();
                    ctx.translate(w / 2, h / 2);
                    if (state.rotation) ctx.rotate(state.rotation * Math.PI / 180);
                    if (state.flipH) ctx.scale(-1, 1);
                    if (state.flipV) ctx.scale(1, -1);

                    let sx = 0, sy = 0, sw = videoElement.videoWidth, sh = videoElement.videoHeight;
                    if (state.cropRegion) {
                        sx = state.cropRegion.x;
                        sy = state.cropRegion.y;
                        sw = state.cropRegion.w;
                        sh = state.cropRegion.h;
                    }
                    ctx.drawImage(videoElement, sx, sy, sw, sh, -w / 2, -h / 2, w, h);
                    ctx.restore();
                    applyCanvasFilters();
                } else {
                    ctx.fillStyle = '#1E293B';
                    ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#CBD5E1';
                    ctx.font = '30px ' + getComputedStyle(document.body).fontFamily;
                    ctx.textAlign = 'center';
                    ctx.fillText('📹 Import a video to start', w / 2, h / 2);
                }

                // Draw overlays
                state.overlays.forEach(ovl => drawOverlay(ovl));

                // Draw transition
                if (state.transition && state.transitionProgress > 0 && state.transitionProgress < 1) {
                    drawTransition();
                }

                // Draw crop indicator
                if (state.cropRegion && videoElement.readyState >= 2) {
                    ctx.strokeStyle = '#3B82F6';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([10, 5]);
                    const cr = state.cropRegion;
                    const scaleX = w / videoElement.videoWidth;
                    const scaleY = h / videoElement.videoHeight;
                    ctx.strokeRect(cr.x * scaleX, cr.y * scaleY, cr.w * scaleX, cr.h * scaleY);
                    ctx.setLineDash([]);
                }
            }

            function applyCanvasFilters() {
                const f = state.filters;
                let filterStr = '';
                filterStr += `brightness(${f.brightness / 100}) `;
                filterStr += `contrast(${f.contrast / 100}) `;
                filterStr += `saturate(${f.saturation / 100}) `;
                if (f.blur > 0) filterStr += `blur(${f.blur / 10}px) `;
                if (f.grayscale > 0) filterStr += `grayscale(${f.grayscale}%) `;
                if (f.invert > 0) filterStr += `invert(${f.invert}%) `;
                if (f.sepia > 0) filterStr += `sepia(${f.sepia}%) `;
                ctx.filter = filterStr.trim() || 'none';
            }

            function drawOverlay(ovl) {
                ctx.save();
                ctx.globalAlpha = ovl.opacity !== undefined ? ovl.opacity : 1;
                const cx = ovl.x + ovl.width / 2;
                const cy = ovl.y + ovl.height / 2;
                ctx.translate(cx, cy);
                if (ovl.rotation) ctx.rotate(ovl.rotation * Math.PI / 180);
                ctx.translate(-ovl.width / 2, -ovl.height / 2);

                if (ovl.type === 'text') {
                    ctx.font = `${ovl.fontSize || 48}px "${ovl.font || 'Arial'}"`;
                    ctx.fillStyle = ovl.fontColor || '#ffffff';
                    ctx.textBaseline = 'top';
                    if (ovl.shadowBlur > 0) {
                        ctx.shadowColor = 'rgba(0,0,0,0.7)';
                        ctx.shadowBlur = ovl.shadowBlur;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                    }
                    if (ovl.strokeWidth > 0) {
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = ovl.strokeWidth;
                        ctx.strokeText(ovl.content, 0, 0);
                    }
                    ctx.fillText(ovl.content, 0, 0);
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                } else if (ovl.type === 'emoji' || ovl.type === 'sticker') {
                    ctx.font = `${ovl.height || 60}px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif`;
                    ctx.textBaseline = 'top';
                    ctx.fillText(ovl.content, 0, 0);
                }

                if (ovl.id === state.selectedOverlayId) {
                    ctx.strokeStyle = '#3B82F6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.strokeRect(-2, -2, ovl.width + 4, ovl.height + 4);
                    ctx.setLineDash([]);
                    ctx.fillStyle = '#3B82F6';
                    ctx.fillRect(ovl.width - 6, ovl.height - 6, 12, 12);
                }
                ctx.restore();
            }

            function drawTransition() {
                const p = state.transitionProgress;
                const w = mainCanvas.width;
                const h = mainCanvas.height;
                ctx.save();
                ctx.globalAlpha = 1 - p;
                if (state.transition === 'fade') {
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(0, 0, w, h);
                } else if (state.transition === 'zoom') {
                    ctx.fillStyle = '#020617';
                    const s = 1 + p * 2;
                    ctx.translate(w / 2, h / 2);
                    ctx.scale(s, s);
                    ctx.fillRect(-w, -h, w * 2, h * 2);
                } else if (state.transition === 'slide') {
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(w * (1 - p), 0, w, h);
                } else if (state.transition === 'flash') {
                    ctx.fillStyle = 'rgba(255,255,255,' + (1 - p) + ')';
                    ctx.fillRect(0, 0, w, h);
                }
                ctx.restore();
            }

            // ==================== OVERLAY MANAGEMENT ====================
            function addTextOverlay() {
                const ovl = {
                    type: 'text',
                    x: mainCanvas.width / 2 - 100,
                    y: mainCanvas.height / 2 - 30,
                    width: 200,
                    height: 60,
                    rotation: 0,
                    opacity: 1,
                    content: 'Your Text',
                    font: 'Arial',
                    fontSize: 48,
                    fontColor: '#ffffff',
                    strokeWidth: 0,
                    shadowBlur: 0,
                    id: generateId(),
                };
                state.overlays.push(ovl);
                state.selectedOverlayId = ovl.id;
                updatePropertiesPanel(ovl);
                updateTimelineUI();
                renderFrame(state.currentTime);
                saveState();
                toastMsg('Text added - drag to move');
            }

            function addEmojiOverlay(emoji) {
                const ovl = {
                    type: 'emoji',
                    x: mainCanvas.width / 2 - 30,
                    y: mainCanvas.height / 2 - 30,
                    width: 60,
                    height: 60,
                    rotation: 0,
                    opacity: 1,
                    content: emoji,
                    id: generateId(),
                };
                state.overlays.push(ovl);
                state.selectedOverlayId = ovl.id;
                updatePropertiesPanel(ovl);
                updateTimelineUI();
                renderFrame(state.currentTime);
                saveState();
            }

            function addStickerOverlay(sticker) {
                const ovl = {
                    type: 'sticker',
                    x: mainCanvas.width / 2 - 40,
                    y: mainCanvas.height / 2 - 40,
                    width: 80,
                    height: 80,
                    rotation: 0,
                    opacity: 1,
                    content: sticker,
                    id: generateId(),
                };
                state.overlays.push(ovl);
                state.selectedOverlayId = ovl.id;
                updatePropertiesPanel(ovl);
                updateTimelineUI();
                renderFrame(state.currentTime);
                saveState();
            }

            function updateSelectedOverlay() {
                const ovl = state.overlays.find(o => o.id === state.selectedOverlayId);
                if (!ovl) return;
                if (ovl.type === 'text') {
                    ovl.content = $('#text-content').value;
                    ovl.font = $('#text-font').value;
                    ovl.fontSize = parseInt($('#text-size').value);
                    ovl.fontColor = $('#text-color').value;
                    ovl.strokeWidth = parseInt($('#text-stroke').value);
                    ovl.shadowBlur = parseInt($('#text-shadow').value);
                    ovl.width = Math.max(40, ovl.fontSize * ovl.content.length * 0.55);
                    ovl.height = ovl.fontSize * 1.3;
                } else if (ovl.type === 'emoji' || ovl.type === 'sticker') {
                    const sz = parseInt($('#emoji-size').value);
                    ovl.width = sz;
                    ovl.height = sz;
                    ovl.opacity = parseInt($('#emoji-opacity').value) / 100;
                    ovl.rotation = parseInt($('#emoji-rotation').value);
                }
                renderFrame(state.currentTime);
                saveState();
            }

            function updatePropertiesPanel(ovl) {
                if (!ovl) {
                    $('#prop-text').style.display = 'none';
                    $('#prop-emoji').style.display = 'none';
                    return;
                }
                if (ovl.type === 'text') {
                    $('#prop-text').style.display = 'block';
                    $('#prop-emoji').style.display = 'none';
                    $('#text-content').value = ovl.content;
                    $('#text-font').value = ovl.font || 'Arial';
                    $('#text-size').value = ovl.fontSize || 48;
                    $('#text-size-val').textContent = (ovl.fontSize || 48) + 'px';
                    $('#text-color').value = ovl.fontColor || '#ffffff';
                    $('#text-stroke').value = ovl.strokeWidth || 0;
                    $('#text-shadow').value = ovl.shadowBlur || 0;
                } else if (ovl.type === 'emoji' || ovl.type === 'sticker') {
                    $('#prop-text').style.display = 'none';
                    $('#prop-emoji').style.display = 'block';
                    $('#emoji-size').value = ovl.width || 60;
                    $('#emoji-opacity').value = (ovl.opacity || 1) * 100;
                    $('#emoji-rotation').value = ovl.rotation || 0;
                }
            }

            function deleteSelectedOverlay() {
                if (!state.selectedOverlayId) return;
                state.overlays = state.overlays.filter(o => o.id !== state.selectedOverlayId);
                state.selectedOverlayId = null;
                $('#prop-text').style.display = 'none';
                $('#prop-emoji').style.display = 'none';
                updateTimelineUI();
                renderFrame(state.currentTime);
                saveState();
                toastMsg('Overlay deleted');
            }

            // ==================== CANVAS INTERACTION ====================
            function getCanvasPos(e) {
                const rect = mainCanvas.getBoundingClientRect();
                const scaleX = mainCanvas.width / rect.width;
                const scaleY = mainCanvas.height / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY,
                };
            }

            function findOverlayAt(cx, cy) {
                for (let i = state.overlays.length - 1; i >= 0; i--) {
                    const o = state.overlays[i];
                    const ocx = o.x + o.width / 2;
                    const ocy = o.y + o.height / 2;
                    const dx = Math.abs(cx - ocx);
                    const dy = Math.abs(cy - ocy);
                    if (dx < o.width / 2 + 8 && dy < o.height / 2 + 8) {
                        const nearResize = cx > o.x + o.width - 14 && cy > o.y + o.height - 14;
                        return { overlay: o, nearResize };
                    }
                }
                return null;
            }

            function onCanvasMouseDown(e) {
                const pos = getCanvasPos(e);
                const found = findOverlayAt(pos.x, pos.y);
                if (found) {
                    state.selectedOverlayId = found.overlay.id;
                    updatePropertiesPanel(found.overlay);
                    if (found.nearResize) {
                        state.isResizingOverlay = true;
                        state.dragOffsetX = pos.x;
                        state.dragOffsetY = pos.y;
                    } else {
                        state.isDraggingOverlay = true;
                        state.dragOffsetX = pos.x - found.overlay.x;
                        state.dragOffsetY = pos.y - found.overlay.y;
                    }
                    mainCanvas.style.cursor = found.nearResize ? 'nwse-resize' : 'move';
                } else {
                    state.selectedOverlayId = null;
                    updatePropertiesPanel(null);
                    mainCanvas.style.cursor = 'default';
                }
                renderFrame(state.currentTime);
            }

            function onCanvasMouseMove(e) {
                if (!state.isDraggingOverlay && !state.isResizingOverlay) {
                    const pos = getCanvasPos(e);
                    const found = findOverlayAt(pos.x, pos.y);
                    mainCanvas.style.cursor = found ? (found.nearResize ? 'nwse-resize' : 'move') : 'default';
                    return;
                }
                const pos = getCanvasPos(e);
                const ovl = state.overlays.find(o => o.id === state.selectedOverlayId);
                if (!ovl) return;
                if (state.isDraggingOverlay) {
                    ovl.x = pos.x - state.dragOffsetX;
                    ovl.y = pos.y - state.dragOffsetY;
                } else if (state.isResizingOverlay) {
                    ovl.width = Math.max(20, pos.x - ovl.x);
                    ovl.height = Math.max(20, pos.y - ovl.y);
                    if (ovl.type === 'emoji' || ovl.type === 'sticker') {
                        $('#emoji-size').value = Math.round(ovl.width);
                    }
                }
                renderFrame(state.currentTime);
            }

            function onCanvasMouseUp() {
                if (state.isDraggingOverlay || state.isResizingOverlay) {
                    state.isDraggingOverlay = false;
                    state.isResizingOverlay = false;
                    mainCanvas.style.cursor = 'default';
                    saveState();
                }
            }

            function onCanvasWheel(e) {
                if (state.selectedOverlayId) {
                    e.preventDefault();
                    const ovl = state.overlays.find(o => o.id === state.selectedOverlayId);
                    if (ovl) {
                        ovl.rotation = (ovl.rotation || 0) + (e.deltaY > 0 ? 5 : -5);
                        if (ovl.type === 'emoji' || ovl.type === 'sticker') {
                            $('#emoji-rotation').value = ovl.rotation % 360;
                        }
                        renderFrame(state.currentTime);
                        saveState();
                    }
                }
            }

            function onCanvasDoubleClick(e) {
                const pos = getCanvasPos(e);
                const found = findOverlayAt(pos.x, pos.y);
                if (found && found.overlay.type === 'text') {
                    const newContent = prompt('Edit text:', found.overlay.content);
                    if (newContent !== null) {
                        found.overlay.content = newContent;
                        $('#text-content').value = newContent;
                        renderFrame(state.currentTime);
                        saveState();
                    }
                }
            }

            function onCanvasTouchStart(e) {
                if (e.touches.length === 1) {
                    const touch = e.touches[0];
                    const pos = getCanvasPos(touch);
                    const found = findOverlayAt(pos.x, pos.y);
                    if (found) {
                        e.preventDefault();
                        state.selectedOverlayId = found.overlay.id;
                        updatePropertiesPanel(found.overlay);
                        state.isDraggingOverlay = true;
                        state.dragOffsetX = pos.x - found.overlay.x;
                        state.dragOffsetY = pos.y - found.overlay.y;
                    }
                }
            }

            function onCanvasTouchMove(e) {
                if (state.isDraggingOverlay && e.touches.length === 1) {
                    e.preventDefault();
                    const pos = getCanvasPos(e.touches[0]);
                    const ovl = state.overlays.find(o => o.id === state.selectedOverlayId);
                    if (ovl) {
                        ovl.x = pos.x - state.dragOffsetX;
                        ovl.y = pos.y - state.dragOffsetY;
                        renderFrame(state.currentTime);
                    }
                }
            }

            function onCanvasTouchEnd() {
                if (state.isDraggingOverlay) {
                    state.isDraggingOverlay = false;
                    saveState();
                }
            }

            // ==================== PANEL ACTIONS ====================
            function handlePanelAction(action) {
                switch (action) {
                    case 'trim': openTrimModal(); break;
                    case 'cut': cutCurrentSegment(); break;
                    case 'crop': toggleCropMode(); break;
                    case 'rotate':
                        state.rotation = (state.rotation + 90) % 360;
                        renderFrame(state.currentTime);
                        saveState();
                        toastMsg('Rotated: ' + state.rotation + '°');
                        break;
                    case 'flip-h':
                        state.flipH = !state.flipH;
                        renderFrame(state.currentTime);
                        saveState();
                        toastMsg('Flip Horizontal: ' + (state.flipH ? 'ON' : 'OFF'));
                        break;
                    case 'flip-v':
                        state.flipV = !state.flipV;
                        renderFrame(state.currentTime);
                        saveState();
                        toastMsg('Flip Vertical: ' + (state.flipV ? 'ON' : 'OFF'));
                        break;
                    case 'resize': openResizeModal(); break;
                    case 'delete-media': deleteCurrentMedia(); break;
                }
            }

            function cutCurrentSegment() {
                if (state.videoSources.length === 0) return;
                const ct = state.currentTime;
                if (ct > state.trimStart && ct < (state.trimEnd || state.duration)) {
                    state.trimStart = ct;
                    videoElement.currentTime = ct;
                    seekBar.value = ct * 100;
                    updateTimeDisplay();
                    updateTimelineUI();
                    saveState();
                    toastMsg('Cut: new start at ' + formatTime(ct));
                } else {
                    toastMsg('Position cursor within video to cut');
                }
            }

            function toggleCropMode() {
                if (state.cropRegion) {
                    state.cropRegion = null;
                    toastMsg('Crop removed');
                } else {
                    const vw = videoElement.videoWidth || 1280;
                    const vh = videoElement.videoHeight || 720;
                    state.cropRegion = { x: vw * 0.1, y: vh * 0.1, w: vw * 0.8, h: vh * 0.8 };
                    toastMsg('Crop mode ON');
                }
                renderFrame(state.currentTime);
                saveState();
            }

            function deleteCurrentMedia() {
                if (state.videoSources.length === 0 && state.audioSources.length === 0) {
                    toastMsg('No media to delete');
                    return;
                }
                const html = `
                    <div class="modal-overlay" id="delete-modal-overlay">
                        <div class="modal">
                            <h3>🗑️ Delete Media</h3>
                            <p>Select media to remove:</p>
                            <div class="btn-row" style="flex-direction:column;">
                                ${state.videoSources.length > 0 ? '<button class="tb-btn" id="del-current-video">🎬 Delete current video</button>' : ''}

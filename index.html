            function startExport() {
                if (state.isExporting) return;
                if (!MediaRecorder) {
                    toastMsg('Your browser does not support video export. Please use a modern browser like Chrome or Edge.');
                    return;
                }
                state.isExporting = true;
                const format = $('#export-format').value;
                const quality = $('#export-quality').value;
                const qMap = { '480': { w: 854, h: 480 }, '720': { w: 1280, h: 720 }, '1080': { w: 1920, h: 1080 } };
                const dims = qMap[quality];

                $('#export-progress-bar').style.display = 'block';
                $('#export-progress-fill').style.width = '0%';
                $('#export-progress-text').textContent = 'Preparing...';
                $('#export-start').disabled = true;
                $('#export-start').textContent = 'Exporting...';

                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = dims.w;
                exportCanvas.height = dims.h;
                const exportCtx = exportCanvas.getContext('2d');

                const stream = exportCanvas.captureStream(30);
                let mimeType = 'video/webm;codecs=vp9';
                if (format === 'mp4' && MediaRecorder.isTypeSupported('video/mp4;codecs=avc1.42E01E')) {
                    mimeType = 'video/mp4;codecs=avc1.42E01E';
                } else if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm';
                }

                const chunks = [];
                let recorder;
                try {
                    recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
                } catch (e) {
                    try {
                        recorder = new MediaRecorder(stream, { videoBitsPerSecond: 5000000 });
                    } catch (e2) {
                        toastMsg('Export failed: Your browser does not support MediaRecorder.');
                        state.isExporting = false;
                        $('#export-start').disabled = false;
                        $('#export-start').textContent = 'Export';
                        return;
                    }
                }

                recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mimeType });
                    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'edited_video.' + ext;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    state.isExporting = false;
                    $('#export-progress-text').textContent = 'Done! ✅';
                    $('#export-start').disabled = false;
                    $('#export-start').textContent = 'Export';
                    toastMsg('Export complete! 📤');
                    setTimeout(() => { if (modalContainer.innerHTML.includes('export-modal-overlay')) modalContainer.innerHTML = ''; }, 1500);
                };

                recorder.start(100);
                const origPlaying = state.isPlaying;
                if (origPlaying) pausePlayback();

                const startTime = state.trimStart;
                const endTime = state.trimEnd || state.duration;
                const totalDuration = endTime - startTime;
                const fps = 30;
                const totalFrames = Math.max(1, Math.ceil(totalDuration * fps));
                let frameIndex = 0;
                videoElement.currentTime = startTime;

                function exportFrame() {
                    if (frameIndex >= totalFrames || !state.isExporting) {
                        recorder.stop();
                        if (origPlaying) startPlayback();
                        return;
                    }
                    const t = startTime + (frameIndex / fps);
                    videoElement.currentTime = t;

                    const checkSeek = () => {
                        if (Math.abs(videoElement.currentTime - t) < 0.05 || frameIndex === 0) {
                            exportCtx.clearRect(0, 0, dims.w, dims.h);
                            if (videoElement.readyState >= 2) {
                                exportCtx.drawImage(videoElement, 0, 0, dims.w, dims.h);
                            }
                            const sx = dims.w / mainCanvas.width;
                            const sy = dims.h / mainCanvas.height;
                            state.overlays.forEach(ovl => {
                                exportCtx.save();
                                exportCtx.globalAlpha = ovl.opacity !== undefined ? ovl.opacity : 1;
                                const cx = ovl.x * sx + ovl.width * sx / 2;
                                const cy = ovl.y * sy + ovl.height * sy / 2;
                                exportCtx.translate(cx, cy);
                                if (ovl.rotation) exportCtx.rotate(ovl.rotation * Math.PI / 180);
                                exportCtx.translate(-ovl.width * sx / 2, -ovl.height * sy / 2);
                                if (ovl.type === 'text') {
                                    exportCtx.font = `${(ovl.fontSize||48)*sy}px "${ovl.font||'Arial'}"`;
                                    exportCtx.fillStyle = ovl.fontColor || '#fff';
                                    exportCtx.fillText(ovl.content, 0, 0);
                                } else {
                                    exportCtx.font = `${(ovl.height||60)*sy}px "Segoe UI Emoji",sans-serif`;
                                    exportCtx.fillText(ovl.content, 0, 0);
                                }
                                exportCtx.restore();
                            });
                            frameIndex++;
                            const progress = Math.round((frameIndex / totalFrames) * 100);
                            $('#export-progress-fill').style.width = progress + '%';
                            $('#export-progress-text').textContent = progress + '%';
                            setTimeout(exportFrame, 1000 / fps);
                        } else {
                            requestAnimationFrame(checkSeek);
                        }
                    };
                    checkSeek();
                }
                setTimeout(exportFrame, 200);
            }

            function removeVideoSource(index) {
                if (state.videoSources.length <= 1) {
                    toastMsg('Cannot remove last video source');
                    return;
                }
                URL.revokeObjectURL(state.videoSources[index].url);
                state.videoSources.splice(index, 1);
                if (state.currentVideoIndex >= state.videoSources.length) {
                    state.currentVideoIndex = state.videoSources.length - 1;
                }
                loadVideoSource(state.currentVideoIndex);
                updateTimelineUI();
                saveState();
            }

            function removeAudioSource(index) {
                URL.revokeObjectURL(state.audioSources[index].url);
                state.audioSources.splice(index, 1);
                if (state.audioSources.length === 0) {
                    musicElement.src = '';
                    $('#prop-music').style.display = 'none';
                }
                updateTimelineUI();
                saveState();
            }

            // ==================== SAVE / LOAD PROJECT ====================
            function saveProjectToFile() {
                const projectData = {
                    version: '1.0',
                    timestamp: Date.now(),
                    videoSources: state.videoSources.map(s => ({ name: s.name, duration: s.duration })),
                    audioSources: state.audioSources.map(s => ({ name: s.name })),
                    currentVideoIndex: state.currentVideoIndex,
                    overlays: state.overlays,
                    selectedOverlayId: state.selectedOverlayId,
                    volume: state.volume,
                    muted: state.muted,
                    speed: state.speed,
                    filters: state.filters,
                    activeFilter: state.activeFilter,
                    trimStart: state.trimStart,
                    trimEnd: state.trimEnd,
                    cropRegion: state.cropRegion,
                    flipH: state.flipH,
                    flipV: state.flipV,
                    rotation: state.rotation,
                    musicVolume: state.musicVolume,
                    musicLoop: state.musicLoop,
                    transition: state.transition,
                    canvasWidth: mainCanvas.width,
                    canvasHeight: mainCanvas.height,
                };

                const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'project_' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                toastMsg('Project saved! 💾 (Note: Video/audio files must be re-imported)');
            }

            function loadProjectFromFile(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.trimStart !== undefined) state.trimStart = data.trimStart;
                        if (data.trimEnd !== undefined) state.trimEnd = data.trimEnd;
                        if (data.cropRegion) state.cropRegion = data.cropRegion;
                        if (data.flipH !== undefined) state.flipH = data.flipH;
                        if (data.flipV !== undefined) state.flipV = data.flipV;
                        if (data.rotation !== undefined) state.rotation = data.rotation;
                        if (data.filters) Object.assign(state.filters, data.filters);
                        if (data.overlays) state.overlays = data.overlays;
                        if (data.transition) state.transition = data.transition;
                        if (data.speed) {
                            state.speed = data.speed;
                            speedSelect.value = data.speed;
                            videoElement.playbackRate = data.speed;
                        }
                        if (data.volume !== undefined) {
                            state.volume = data.volume;
                            volumeSlider.value = data.volume * 100;
                        }
                        if (data.muted !== undefined) {
                            state.muted = data.muted;
                            btnMute.textContent = state.muted ? '🔇' : '🔊';
                        }
                        if (data.canvasWidth && data.canvasHeight) {
                            mainCanvas.width = data.canvasWidth;
                            mainCanvas.height = data.canvasHeight;
                        }
                        updateCanvasSize();
                        updateTimelineUI();
                        updateFilterPanel();
                        renderFrame(state.currentTime);
                        updateTimeDisplay();
                        saveState();
                        toastMsg('Project loaded! 📂 (Re-import video/audio files)');
                    } catch (err) {
                        console.error('Failed to load project:', err);
                        toastMsg('Error loading project file');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            }

            // ==================== UNDO / REDO ====================
            function saveState() {
                const snapshot = {
                    videoSources: state.videoSources.map(s => ({ ...s, file: null, url: s.url })),
                    audioSources: state.audioSources.map(s => ({ ...s, file: null, url: s.url, audioBuffer: null })),
                    currentVideoIndex: state.currentVideoIndex,
                    overlays: JSON.parse(JSON.stringify(state.overlays)),
                    selectedOverlayId: state.selectedOverlayId,
                    currentTime: state.currentTime,
                    volume: state.volume,
                    muted: state.muted,
                    speed: state.speed,
                    filters: { ...state.filters },
                    activeFilter: state.activeFilter,
                    trimStart: state.trimStart,
                    trimEnd: state.trimEnd,
                    cropRegion: state.cropRegion ? { ...state.cropRegion } : null,
                    flipH: state.flipH,
                    flipV: state.flipV,
                    rotation: state.rotation,
                    musicVolume: state.musicVolume,
                    musicFadeIn: state.musicFadeIn,
                    musicFadeOut: state.musicFadeOut,
                    musicLoop: state.musicLoop,
                    transition: state.transition,
                };
                state.undoStack.push(snapshot);
                if (state.undoStack.length > 50) state.undoStack.shift();
                state.redoStack = [];
            }

            function undo() {
                if (state.undoStack.length === 0) {
                    toastMsg('Nothing to undo');
                    return;
                }
                const currentSnap = createSnapshot();
                state.redoStack.push(currentSnap);
                const snap = state.undoStack.pop();
                restoreSnapshot(snap);
                toastMsg('Undo ↩️');
            }

            function redo() {
                if (state.redoStack.length === 0) {
                    toastMsg('Nothing to redo');
                    return;
                }
                const currentSnap = createSnapshot();
                state.undoStack.push(currentSnap);
                const snap = state.redoStack.pop();
                restoreSnapshot(snap);
                toastMsg('Redo ↪️');
            }

            function createSnapshot() {
                return {
                    videoSources: state.videoSources.map(s => ({ ...s, file: null, url: s.url })),
                    audioSources: state.audioSources.map(s => ({ ...s, file: null, url: s.url, audioBuffer: null })),
                    currentVideoIndex: state.currentVideoIndex,
                    overlays: JSON.parse(JSON.stringify(state.overlays)),
                    selectedOverlayId: state.selectedOverlayId,
                    currentTime: state.currentTime,
                    volume: state.volume,
                    muted: state.muted,
                    speed: state.speed,
                    filters: { ...state.filters },
                    activeFilter: state.activeFilter,
                    trimStart: state.trimStart,
                    trimEnd: state.trimEnd,
                    cropRegion: state.cropRegion ? { ...state.cropRegion } : null,
                    flipH: state.flipH,
                    flipV: state.flipV,
                    rotation: state.rotation,
                    musicVolume: state.musicVolume,
                    musicFadeIn: state.musicFadeIn,
                    musicFadeOut: state.musicFadeOut,
                    musicLoop: state.musicLoop,
                    transition: state.transition,
                };
            }

            function restoreSnapshot(snap) {
                state.currentVideoIndex = snap.currentVideoIndex;
                state.overlays = JSON.parse(JSON.stringify(snap.overlays));
                state.selectedOverlayId = snap.selectedOverlayId;
                state.volume = snap.volume;
                state.muted = snap.muted;
                state.speed = snap.speed;
                state.filters = { ...snap.filters };
                state.activeFilter = snap.activeFilter;
                state.trimStart = snap.trimStart;
                state.trimEnd = snap.trimEnd;
                state.cropRegion = snap.cropRegion ? { ...snap.cropRegion } : null;
                state.flipH = snap.flipH;
                state.flipV = snap.flipV;
                state.rotation = snap.rotation;
                state.musicVolume = snap.musicVolume;
                state.musicFadeIn = snap.musicFadeIn;
                state.musicFadeOut = snap.musicFadeOut;
                state.musicLoop = snap.musicLoop;
                state.transition = snap.transition;
                state.currentTime = snap.currentTime;

                videoElement.volume = state.muted ? 0 : state.volume;
                videoElement.playbackRate = state.speed;
                volumeSlider.value = state.volume * 100;
                speedSelect.value = state.speed;
                btnMute.textContent = state.muted ? '🔇' : '🔊';
                seekBar.value = state.currentTime * 100;
                if (state.musicGainNode) state.musicGainNode.gain.value = state.muted ? 0 : state.musicVolume;
                $('#music-volume').value = state.musicVolume * 100;
                $('#music-fadein').value = state.musicFadeIn;
                $('#music-fadeout').value = state.musicFadeOut;
                $('#music-loop').checked = state.musicLoop;

                updateTimelineUI();
                updatePropertiesPanel(state.overlays.find(o => o.id === state.selectedOverlayId) || null);
                updateFilterPanel();
                renderFrame(state.currentTime);
                updateTimeDisplay();
            }

            function resetProject() {
                if (confirm('Reset entire project? This cannot be undone.')) {
                    state.videoSources.forEach(s => URL.revokeObjectURL(s.url));
                    state.audioSources.forEach(s => URL.revokeObjectURL(s.url));
                    state.videoSources = [];
                    state.audioSources = [];
                    state.overlays = [];
                    state.selectedOverlayId = null;
                    state.currentVideoIndex = 0;
                    state.isPlaying = false;
                    state.isStopped = false;
                    state.currentTime = 0;
                    state.duration = 0;
                    state.trimStart = 0;
                    state.trimEnd = null;
                    state.cropRegion = null;
                    state.flipH = false;
                    state.flipV = false;
                    state.rotation = 0;
                    state.filters = { brightness: 100, contrast: 100, saturation: 100, vibrance: 100, exposure: 100, warmth: 0, blur: 0, vignette: 0, grayscale: 0, invert: 0, sepia: 0, sharpen: 0, glow: 0, hdr: 0 };
                    state.transition = null;
                    state.transitionProgress = 0;
                    state.undoStack = [];
                    state.redoStack = [];
                    videoElement.src = '';
                    musicElement.src = '';
                    btnPlay.textContent = '▶';
                    seekBar.value = 0;
                    updateTimelineUI();
                    updatePropertiesPanel(null);
                    $('#prop-music').style.display = 'none';
                    $('#prop-filter').style.display = 'none';
                    renderFrame(0);
                    updateTimeDisplay();
                    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                    if (state.animationFrameId) cancelAnimationFrame(state.animationFrameId);
                    toastMsg('Project reset 🔄');
                }
            }

            // ==================== UTILITIES ====================
            function toastMsg(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // ==================== INITIALIZATION ====================
            updateCanvasSize();
            renderFrame(0);
            updateTimeDisplay();
            updateFilterPresets();
            init();

            console.log('✅ Cap Video Editor Studio Maker Creator initialized');
            console.log('📹 All buttons connected and functional');
            console.log('🎬 Import video | 🎵 Add audio | 🔤 Add text | 😀 Add emojis');
            console.log('⌨️ Space=Play/Pause | Arrow keys=Skip | Ctrl+Z=Undo | Ctrl+Y=Redo | Ctrl+S=Save');
        })();
    </script>
</body>
</html>
